<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temmes — Contatti</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <script src="../assets/js/site.js"></script>

  <main>

    <section class="hero hero--page">
      <div class="hero-inner">
        <h1>Contatti</h1>
      </div>
    </section>

    <section class="content-section">
      <div class="container">
        <p class="section-label">Dove Siamo</p>
        <h2 class="section-title">Recapiti</h2>

        <div class="contact-grid">

          <!-- Replace src with your actual Google Maps embed URL -->
          <div class="contact-map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d819.8946931309689!2d13.613157941584697!3d45.93699646494145!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x477b00c9622f1535%3A0xda6793e64cd26f4b!2sTemmes%20S.r.l.!5e1!3m2!1sen!2sus!4v1776984172632!5m2!1sen!2sus"
              width="600"
              height="450"
              style="border:0;"
              allowfullscreen=""
              loading="lazy" 
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>

          <div class="contact-info">

            <div class="contact-block">
              <p class="contact-label">Telefono</p>
              <p class="contact-value">+39 02 1234 5678</p>
            </div>

            <div class="contact-block">
              <p class="contact-label">Fax</p>
              <p class="contact-value">+39 02 8765 4321</p>
            </div>

            <div class="contact-block">
              <p class="contact-label">Email</p>
              <ul class="email-list">
                <li>
                  <span class="email-role">Info</span>
                  <a href="mailto:info@temmes.com">info@temmes.com</a>
                </li>
                <li>
                  <span class="email-role">Direzione</span>
                  <a href="mailto:direzione@temmes.com">direzione@temmes.com</a>
                </li>
                <li>
                  <span class="email-role">Ufficio Commerciale</span>
                  <a href="mailto:commerciale@temmes.com">commerciale@temmes.com</a>
                </li>
                <li>
                  <span class="email-role">Ufficio Amministrativo</span>
                  <a href="mailto:amministrativo@temmes.com">amministrativo@temmes.com</a>
                </li>
              </ul>
            </div>

          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Temmes. Tutti i diritti riservati.</p>
  </footer>

</body>
</html>
